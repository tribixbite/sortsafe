name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # npm (not the committed bun.lock) resolves the linux-x64 rollup +
      # lightningcss native binaries automatically for the CI platform.
      # postinstall.sh is a no-op off Termux.
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Sync SvelteKit
        run: npx svelte-kit sync
      - name: Build
        run: npx vite build
      # SPA deep-link support on GitHub Pages: serve the fallback for 404s too.
      - name: SPA 404 fallback
        run: cp build/index.html build/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
